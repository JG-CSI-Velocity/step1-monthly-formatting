<section class="cover-page">
  <div class="cover-inner">
    <div class="cover-stripe"></div>

    <h1 class="cover-title">{{ client.display_name }}</h1>
    <p class="cover-subtitle">A month in review &mdash; performance, opportunities, and the story behind the numbers.</p>
    <div class="cover-meta">
